name: Build GitHub Pages site

on:
  push:
    branches: [main]
    paths-ignore:
      - '.nojekyll'
      - '_app/**'
      - 'Elham_Aboutorabi_Resume.md'
      - 'fa.html'
      - 'index.html'
      - 'robots.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Sync build output to repository root
        run: |
          rm -rf _app
          rm -f .nojekyll Elham_Aboutorabi_Resume.md fa.html hero_headshot.png index.html robots.txt
          cp -R build/. .
          touch .nojekyll

      - name: Commit root build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nojekyll _app Elham_Aboutorabi_Resume.md fa.html hero_headshot.png index.html robots.txt

          if git diff --cached --quiet; then
            echo "No root build changes to commit."
            exit 0
          fi

          git commit -m "Build GitHub Pages root site"
          git push
